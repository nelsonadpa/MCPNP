<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eRegistrations Agent Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace; }
    #root { min-height: 100vh; }
    #launch-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 10px 20px;
      background: rgba(10, 14, 26, 0.95);
      border-top: 1px solid rgba(244, 114, 182, 0.3);
      backdrop-filter: blur(10px);
    }
    #launch-bar.light {
      background: rgba(248, 250, 252, 0.95);
      border-top: 1px solid rgba(244, 114, 182, 0.2);
    }
    .launch-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 20px; border-radius: 8px;
      font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .launch-btn:hover { transform: translateY(-1px); }
    .launch-btn-primary {
      background: linear-gradient(135deg, #f472b6, #ec4899);
      color: #fff;
    }
    .launch-btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #94a3b8;
    }
    .launch-btn-secondary.light {
      background: rgba(0,0,0,0.04);
      border: 1px solid #e2e8f0;
      color: #64748b;
    }
    .launch-hint {
      font-size: 10px; color: #64748b;
      max-width: 320px; text-align: center; line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="launch-bar">
    <button class="launch-btn launch-btn-primary" onclick="launchAgents()">
      Launch All Agents
    </button>
    <div class="launch-hint" id="launch-hint">
      Copies launch command to clipboard. Paste in Terminal (Cmd+V).
    </div>
  </div>

  <!-- React from CDN (production, no Babel needed - dashboard uses createElement) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Dashboard component -->
  <script src="dashboard.jsx"></script>

  <script>
    // Render the dashboard
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AgentDashboard));

    // Add padding at bottom so content isn't hidden behind launch bar
    document.getElementById('root').style.paddingBottom = '60px';

    // Sync launch bar theme with dashboard theme
    var observer = new MutationObserver(function() {
      var bg = document.getElementById('root').firstChild;
      if (bg && bg.style) {
        var isDark = bg.style.background === '#0a0e1a' || bg.style.backgroundColor === '#0a0e1a';
        var bar = document.getElementById('launch-bar');
        var copyBtn = document.getElementById('copy-btn');
        if (!isDark) {
          bar.className = 'light';
          bar.style.background = 'rgba(248,250,252,0.95)';
          bar.style.borderTop = '1px solid rgba(244,114,182,0.2)';
          if (copyBtn) {
            copyBtn.style.background = 'rgba(0,0,0,0.04)';
            copyBtn.style.borderColor = '#e2e8f0';
            copyBtn.style.color = '#64748b';
          }
        } else {
          bar.className = '';
          bar.style.background = 'rgba(10,14,26,0.95)';
          bar.style.borderTop = '1px solid rgba(244,114,182,0.3)';
          if (copyBtn) {
            copyBtn.style.background = 'rgba(255,255,255,0.06)';
            copyBtn.style.borderColor = 'rgba(255,255,255,0.12)';
            copyBtn.style.color = '#94a3b8';
          }
        }
      }
    });
    observer.observe(document.getElementById('root'), { attributes: true, subtree: true, attributeFilter: ['style'] });

    // Launch agents: copy command to clipboard
    function launchAgents() {
      var cmd = 'cd ~/Desktop/OCAgents && ./launch-all.sh';
      var hint = document.getElementById('launch-hint');
      var btn = document.querySelector('.launch-btn-primary');
      if (navigator.clipboard) {
        navigator.clipboard.writeText(cmd).then(function() {
          btn.textContent = 'Copied!';
          btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
          hint.innerHTML = 'Paste in Terminal (Cmd+V): <code style="background:rgba(34,197,94,0.15);padding:2px 8px;border-radius:4px;color:#22c55e">' + cmd + '</code>';
          hint.style.color = '#22c55e';
          setTimeout(function() {
            btn.textContent = 'Launch All Agents';
            btn.style.background = 'linear-gradient(135deg, #f472b6, #ec4899)';
            hint.textContent = 'Copies launch command to clipboard. Paste in Terminal (Cmd+V).';
            hint.style.color = '#64748b';
          }, 8000);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = cmd;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        hint.textContent = 'Paste in Terminal (Cmd+V)';
        hint.style.color = '#22c55e';
      }
    }
  </script>
</body>
</html>
